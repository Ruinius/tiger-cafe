
[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [
    ".git",
    "__pycache__",
    ".venv",
    "venv",
    "node_modules",
    "build",
    "dist",
    ".conda",
    "conda",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long (handled by ruff-format)
    "B008",  # do not perform function calls in argument defaults
    "C901",  # too complex
    "UP007",  # Use X | Y for type annotations (Union[X, Y] is fine for compatibility)
    "B904",  # Exception chaining (can be added incrementally)
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.bandit]
exclude_dirs = ["tests", "test_", "migrations", ".venv", "venv", "node_modules", ".conda", "conda"]
skips = ["B101"]  # Skip assert_used check (common in tests)

